name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '12.*', testbench: '10.*' }
          - { php: '8.4', laravel: '12.*', testbench: '10.*' }
          - { php: '8.4', laravel: '13.*', testbench: '11.*' }

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, pdo_sqlite
          coverage: none

      - name: Drop the monorepo path repository when building standalone
        run: |
          if [ ! -d ../base-monitoring ]; then
            composer config --unset repositories.base-monitoring
          fi

      - name: Pin the framework version
        run: >
          composer require
          "illuminate/support:${{ matrix.laravel }}"
          "orchestra/testbench:${{ matrix.testbench }}"
          --no-interaction --no-update --dev

      - run: composer update --prefer-stable --no-interaction --no-progress

      - run: vendor/bin/pest --ci
